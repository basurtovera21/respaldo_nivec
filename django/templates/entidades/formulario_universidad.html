{% extends "base_formulario.html" %}

{% block form_fields %}
<style>
    .campo input[type="file"] {
        padding: 9px 12px;
        background-color: #fcfcfc;
        cursor: pointer;
        width: 100%;
    }
    
    .campo input[type="checkbox"] {
        width: auto;
        margin-right: 8px;
        margin-top: 8px;
        transform: scale(1.1);
        cursor: pointer;
    }

    .campo a {
        color: #0071e3;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        display: inline-block;
        margin-bottom: 8px;
    }
    .campo a:hover {
        text-decoration: underline;
    }
</style>

{% for field in formulario %}
    <div class="campo">
        <label for="{{ field.id_for_label }}" style="font-weight: bold;">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
            <div class="ayuda">{{ field.help_text }}</div>
        {% endif %}
        
        {% if field.errors %}
            {% for error in field.errors %}
                <div class="error-campo">{{ error }}</div>
            {% endfor %}
        {% endif %}
    </div>
{% endfor %}
{% endblock %}
