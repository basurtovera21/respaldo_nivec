{% extends "base.html" %}
{% block titulo %}NIVEC{% endblock %}

{% block contenido %}
    <h2 style="margin-bottom: 20px;">Dirección Institucional</h2>

    <div style="margin-bottom: 20px;">
        <a href="{% url 'detalle_universidad' %}" class="boton boton-secundario">Información institucional</a>
    </div>

    <div class="tarjeta">
        <h2 style="font-size: 16px; font-weight: bold; margin-bottom: 4px;">Institución</h2>
        <p style="color: #5c6b73; margin-bottom: 16px; font-size: 13px; font-weight: bold;">Base institucional</p>
        <div class="acciones" style="margin-bottom: 0;">
            <a href="{% url 'listar_campus' %}" class="boton boton-secundario">Campus</a>
            {% if tiene_carreras %}
            <a href="{% url 'listar_carreras' %}" class="boton boton-secundario">Carreras</a>
            {% endif %}
            {% if tiene_periodos %}
            <a href="{% url 'listar_periodos' %}" class="boton boton-secundario">Periodos de nivelación</a>
            {% endif %}
        </div>
    </div>
{% endblock %}
