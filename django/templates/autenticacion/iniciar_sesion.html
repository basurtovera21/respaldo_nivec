{% extends "base.html" %}
{% block titulo %}NIVEC{% endblock %}

{% block contenido %}
<div style="max-width: 380px; margin: 60px auto;">
    <div class="tarjeta">
        <h2 style="text-align:center; margin-bottom:20px; font-weight: bold;">NIVEC</h2>
        <form method="post">
            {% csrf_token %}
            <div class="campo">
                <label style="font-weight: bold;">Correo institucional</label>
                <input type="email" name="correo_institucional" required autofocus>
            </div>
            <div class="campo">
                <label style="font-weight: bold;">Contraseña</label>
                <input type="password" name="contrasena" required>
            </div>
            <button type="submit" class="boton boton-primario" style="width:100%; margin-top:8px;">
                Iniciar sesión
            </button>
        </form>
    </div>

    <div style="text-align: center; margin-top: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: bold; color: #5C6B73;">
        Sistema Técnico de Control de Nivelación en Educación Superior
    </div>
</div>
{% endblock %}
