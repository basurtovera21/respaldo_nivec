{% extends "base.html" %}

{% block titulo %}{{ titulo_pagina|default:"NIVEC" }}{% endblock %}

{% block contenido %}
<div class="tarjeta">
    <h2 style="font-size: 16px; font-weight: bold; margin-bottom: 4px;">{{ titulo }}</h2>
    <p style="color: #515154; font-size: 13px; font-weight: bold; margin-bottom: 16px;">
        Establezca el periodo de nivelación (en planificación)
    </p>

    <form method="post" enctype="multipart/form-data" novalidate style="max-width: 500px;">
        {% csrf_token %}

        <div class="campo">
            <label for="periodo" style="font-weight: bold;">Periodo de nivelación</label>
            <select name="periodo" id="periodo">
                <option value=""></option>
                {% for p in periodos %}
                    <option value="{{ p.id }}">{{ p.periodo }} ({{ p.anio }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="campo">
            <label style="font-weight: bold;">Documento de la MTN</label>
            <div style="margin-top: 8px; margin-bottom: 8px;">
                <input type="file" name="archivo_excel" accept=".xlsx" style="font-size: 13px; color: #1d1d1f; cursor: pointer;">
            </div>
            <div class="ayuda" style="line-height: 1.4; color: #1d1d1f;">
                {% if url_plantilla %}
                    <a href="{% url url_plantilla %}" style="color: #0071e3; text-decoration: none; font-weight: bold;">Descargar formato</a>
                {% endif %}
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 15px;">
            <button type="submit" class="boton boton-primario">Procesar</button>
            <a href="{% if url_cancelar %}{% url url_cancelar %}{% else %}#{% endif %}" class="boton boton-secundario">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
